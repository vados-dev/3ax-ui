{{define "form/mtproto"}}
<a-form :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
  <a-form-item>
    <template slot="label">
      <a-tooltip>
        <template slot="title">
          <span>{{ i18n "pages.inbounds.mtproto.fakeTlsDomainRandom" }}</span>
        </template>
        {{ i18n "pages.inbounds.mtproto.fakeTlsDomain" }} <a-icon @click="randomizeMtprotoDomain()" type="sync"></a-icon>
      </a-tooltip>
    </template>
    <a-input
      v-model.trim="inbound.settings.fakeTlsDomain"
      placeholder="www.cloudflare.com"
    ></a-input>
  </a-form-item>
  <a-form-item>
    <template slot="label">
      <a-tooltip>
        <template slot="title">
          <span>{{ i18n "pages.inbounds.mtproto.routeDesc" }}</span>
        </template>
        {{ i18n "pages.inbounds.mtproto.route" }}
      </a-tooltip>
    </template>
    <a-switch v-model="inbound.settings.routeThroughXray"></a-switch>
  </a-form-item>
  <a-form-item v-if="inbound.settings.routeThroughXray">
    <template slot="label">
      <a-tooltip>
        <template slot="title">
          <span>{{ i18n "pages.inbounds.mtproto.outboundTagDesc" }}</span>
        </template>
        {{ i18n "pages.inbounds.mtproto.outboundTag" }}
      </a-tooltip>
    </template>
    <a-input
      v-model.trim="inbound.settings.outboundTag"
      placeholder="proxy"
    ></a-input>
  </a-form-item>
</a-form>
<!-- First client on create; further clients are added via the client table on
     the inbounds list. The per-client FakeTLS secret is generated on save. -->
<a-collapse activeKey="0" v-for="(client, index) in inbound.settings.clients.slice(0,1)" v-if="!isEdit">
  <a-collapse-panel header='{{ i18n "pages.inbounds.client" }}'>
    {{template "form/client" .}}
  </a-collapse-panel>
</a-collapse>
{{end}}
